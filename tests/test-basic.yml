name: Test basic tag creation
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          token: ${{ github.token }}
          version: v0.1.0
          message: "Test release v0.1.0"
        continue-on-error: true
      - name: Assert action ran with all required inputs
        run: |
          echo "Action outcome: ${{ steps.action.outcome }}"
          echo "All required inputs (token, version, message) were provided."
          echo "PASS: inputs covered"
